name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to (re)build, e.g. v0.1.0. Must already exist as a GitHub Release.'
        required: true
        type: string
      prerelease:
        description: 'Treat as prerelease (skips :latest image tag).'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_OCI_REPO: ghcr.io/${{ github.repository_owner }}/charts
  GO_VERSION: '1.25'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      version_no_v: ${{ steps.meta.outputs.version_no_v }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          EVENT_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            tag="${INPUT_VERSION}"
            prerelease="${INPUT_PRERELEASE:-true}"
          else
            tag="${GITHUB_REF_NAME}"
            prerelease="${EVENT_PRERELEASE:-false}"
          fi
          echo "version=${tag}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  web:
    name: Build web bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            modules/web-dashboard/pnpm-lock.yaml
            modules/web-widget/pnpm-lock.yaml

      - name: Install pnpm workspace deps
        run: pnpm install --frozen-lockfile

      - name: Restore moon + operator tool cache
        uses: actions/cache@v4
        with:
          path: |
            .moon/cache
            modules/operator/bin
          key: moon-${{ runner.os }}-${{ hashFiles('.moon/toolchain.yml', 'modules/operator/go.sum', 'pnpm-lock.yaml', 'modules/operator/scripts/install-tools.sh', 'modules/operator/moon.yml') }}
          restore-keys: |
            moon-${{ runner.os }}-

      - uses: moonrepo/setup-toolchain@v0

      - name: Build dashboard + widget bundles
        run: moon run web-dashboard:compile web-widget:compile

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: |
            modules/operator/internal/dashboard/dist
            modules/operator/internal/widget/dist
          if-no-files-found: error
          retention-days: 1

  build-binary:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [meta, web]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}

      - name: Restore web bundles
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: modules/operator/internal

      - name: Verify web bundles present
        run: |
          test -f modules/operator/internal/dashboard/dist/index.html
          test -d modules/operator/internal/widget/dist

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: modules/operator/go.sum

      - name: Build operator binary
        working-directory: modules/operator
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X main.version=${{ needs.meta.outputs.version }}" \
            -o "dist/manager_${GOOS}_${GOARCH}${{ matrix.ext }}" \
            ./cmd

      - uses: actions/upload-artifact@v4
        with:
          name: manager-${{ matrix.goos }}-${{ matrix.goarch }}
          path: modules/operator/dist/manager_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 1

      - name: Attach binary to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="route-prism-operator_${{ needs.meta.outputs.version_no_v }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          cp "modules/operator/dist/manager_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}" "${asset}"
          sha256sum "${asset}" > "${asset}.sha256"
          gh release upload "${{ needs.meta.outputs.version }}" \
            "${asset}" "${asset}.sha256" --clobber

  docker:
    name: Build & push image (multi-arch)
    runs-on: ubuntu-latest
    needs: [meta, build-binary]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: manager-linux-amd64
          path: modules/operator/dist

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: manager-linux-arm64
          path: modules/operator/dist

      - name: Make binaries executable
        run: |
          chmod +x modules/operator/dist/manager_linux_amd64
          chmod +x modules/operator/dist/manager_linux_arm64
          ls -la modules/operator/dist/

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: img
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.meta.outputs.prerelease == 'false' }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: modules/operator
          file: modules/operator/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.img.outputs.tags }}
          labels: ${{ steps.img.outputs.labels }}
          provenance: false

  installer:
    name: Generate install.yaml
    runs-on: ubuntu-latest
    needs: [meta, docker]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: modules/operator/go.sum

      - name: Restore moon + operator tool cache
        uses: actions/cache@v4
        with:
          path: |
            .moon/cache
            modules/operator/bin
          key: moon-${{ runner.os }}-${{ hashFiles('.moon/toolchain.yml', 'modules/operator/go.sum', 'pnpm-lock.yaml', 'modules/operator/scripts/install-tools.sh', 'modules/operator/moon.yml') }}
          restore-keys: |
            moon-${{ runner.os }}-

      - uses: moonrepo/setup-toolchain@v0

      - name: Build installer manifest
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.version_no_v }}
        run: moon run operator:build-installer

      - name: Rename for release
        run: mv modules/operator/dist/install.yaml "modules/operator/dist/route-prism-${{ needs.meta.outputs.version_no_v }}.yaml"

      - name: Attach install.yaml to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="modules/operator/dist/route-prism-${{ needs.meta.outputs.version_no_v }}.yaml"
          gh release upload "${{ needs.meta.outputs.version }}" \
            "${asset}" --clobber

  helm:
    name: Package & publish Helm chart
    runs-on: ubuntu-latest
    needs: [meta, docker]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: modules/operator/go.sum

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Restore moon + operator tool cache
        uses: actions/cache@v4
        with:
          path: |
            .moon/cache
            modules/operator/bin
          key: moon-${{ runner.os }}-${{ hashFiles('.moon/toolchain.yml', 'modules/operator/go.sum', 'pnpm-lock.yaml', 'modules/operator/scripts/install-tools.sh', 'modules/operator/moon.yml') }}
          restore-keys: |
            moon-${{ runner.os }}-

      - uses: moonrepo/setup-toolchain@v0

      - name: Stage CRDs into chart
        run: |
          moon run operator:manifests
          mkdir -p charts/route-prism/crds
          cp modules/operator/config/crd/bases/*.yaml charts/route-prism/crds/

      - name: Set chart version & appVersion
        env:
          VER: ${{ needs.meta.outputs.version_no_v }}
        run: |
          sed -i -E "s/^version: .*/version: ${VER}/" charts/route-prism/Chart.yaml
          sed -i -E "s/^appVersion: .*/appVersion: ${VER}/" charts/route-prism/Chart.yaml
          cat charts/route-prism/Chart.yaml

      - name: Lint chart
        run: helm lint charts/route-prism

      - name: Package chart
        run: |
          mkdir -p dist
          helm package charts/route-prism --destination dist

      - name: Login to ghcr.io (helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} --password-stdin

      - name: Push chart to ghcr (OCI)
        run: |
          helm push "dist/route-prism-${{ needs.meta.outputs.version_no_v }}.tgz" \
            "oci://${{ env.CHART_OCI_REPO }}"

      - name: Attach chart .tgz to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.meta.outputs.version }}" \
            "dist/route-prism-${{ needs.meta.outputs.version_no_v }}.tgz" \
            --clobber
