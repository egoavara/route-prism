name: E2E Tests

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: modules/operator/go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: |
            modules/web-dashboard/pnpm-lock.yaml
            modules/web-widget/pnpm-lock.yaml

      - name: Install pnpm workspace deps
        run: pnpm install --frozen-lockfile

      - name: Restore moon + operator tool cache
        uses: actions/cache@v4
        with:
          path: |
            .moon/cache
            modules/operator/bin
          key: moon-${{ runner.os }}-${{ hashFiles('.moon/toolchain.yml', 'modules/operator/go.sum', 'pnpm-lock.yaml', 'modules/operator/scripts/install-tools.sh', 'modules/operator/moon.yml') }}
          restore-keys: |
            moon-${{ runner.os }}-

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Tidy go modules
        working-directory: modules/operator
        run: go mod tidy

      - name: Provision kind cluster for e2e
        run: kind create cluster --name route-prism-test-e2e

      - name: Run e2e tests
        run: moon run operator:e2e

      - name: Tear down kind cluster
        if: always()
        run: kind delete cluster --name route-prism-test-e2e
