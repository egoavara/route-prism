name: E2E Tests

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CLUSTER: route-prism-test-e2e
  KIND_CLUSTER: route-prism-test-e2e

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # moon needs the default branch ref for affected/cache detection

      - uses: actions/setup-go@v5
        with:
          go-version-file: modules/operator/go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: |
            modules/web-dashboard/pnpm-lock.yaml
            modules/web-widget/pnpm-lock.yaml

      - name: Install pnpm workspace deps
        run: pnpm install --frozen-lockfile

      - name: Restore moon + operator tool cache
        uses: actions/cache@v4
        with:
          path: |
            .moon/cache
            modules/operator/bin
          key: moon-${{ runner.os }}-${{ hashFiles('.moon/toolchain.yml', 'modules/operator/go.sum', 'pnpm-lock.yaml', 'modules/operator/scripts/install-tools.sh', 'modules/operator/moon.yml') }}
          restore-keys: |
            moon-${{ runner.os }}-

      - uses: moonrepo/setup-toolchain@v0

      # Same scripts the dev loop uses locally — kind + Cilium + Gateway API CRDs.
      # Export KUBECONFIG + add bin/ to PATH for subsequent steps so the e2e
      # test process inherits both (kubectl needs the kubeconfig; helpers like
      # LoadImageToKindClusterWithName need `kind` on PATH).
      - name: Provision kind cluster + mesh
        run: |
          ./scripts/kind-up.sh --platform cilium
          echo "KUBECONFIG=${GITHUB_WORKSPACE}/bin/.kubeconfig" >> "$GITHUB_ENV"
          echo "${GITHUB_WORKSPACE}/bin" >> "$GITHUB_PATH"

      - name: Run e2e tests
        run: moon run operator:e2e

      - name: Tear down kind cluster
        if: always()
        run: ./scripts/kind-down.sh
