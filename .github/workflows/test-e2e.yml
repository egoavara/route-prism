name: E2E Tests

on:
  push:
  pull_request:

env:
  # Force JS-based actions (checkout, setup-go, etc.) to run on Node.js 24
  # instead of the deprecated Node.js 20 runtime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: |
            web/pnpm-lock.yaml
            web/widget/pnpm-lock.yaml

      - name: Build dashboard + widget bundles
        run: |
          (cd web && pnpm install --frozen-lockfile && pnpm build)
          (cd web/widget && pnpm install --frozen-lockfile && pnpm build)

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e
