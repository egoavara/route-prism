# This rule is not used by the project route-prism itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to route-prism.egoavara.net resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: route-prism
    app.kubernetes.io/managed-by: kustomize
  name: remoteroute-viewer-role
rules:
- apiGroups:
  - route-prism.egoavara.net
  resources:
  - remoteroutes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - route-prism.egoavara.net
  resources:
  - remoteroutes/status
  verbs:
  - get
