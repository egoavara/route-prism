# This rule is not used by the project route-prism itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the route-prism.egoavara.net.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: route-prism
    app.kubernetes.io/managed-by: kustomize
  name: edgetransformation-editor-role
rules:
- apiGroups:
  - route-prism.egoavara.net
  resources:
  - edgetransformations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - route-prism.egoavara.net
  resources:
  - edgetransformations/status
  verbs:
  - get
