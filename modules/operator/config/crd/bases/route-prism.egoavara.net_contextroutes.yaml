---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: contextroutes.route-prism.egoavara.net
spec:
  group: route-prism.egoavara.net
  names:
    kind: ContextRoute
    listKind: ContextRouteList
    plural: contextroutes
    shortNames:
    - cr
    singular: contextroute
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.target.service.name
      name: Target
      type: string
    - jsonPath: .status.matchedVariants
      name: Variants
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ContextRoute is the Schema for the contextroutes API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ContextRouteSpec defines the desired state of ContextRoute.

              The controller emits a single HTTPRoute attached to the target Service.
              The HTTPRoute carries one rule per matched variant ("if Baggage names
              this variant, send the request to it") plus a catch-all rule that sends
              unmarked traffic back to the target Service itself.
            properties:
              routingKey:
                description: |-
                  RoutingKey is the Baggage member key (and cookie-syntax key) this
                  ContextRoute matches against. When omitted, defaults to
                  "<namespace>.<target.service.name>" — guaranteed cluster-unique by
                  Service identity. Manual values are allowed but the operator runs
                  cross-namespace conflict detection: any two ContextRoutes whose
                  effective RoutingKey collide land both in Ready=False/RoutingKeyConflict
                  (older creationTimestamp wins).

                  Naming rules:
                    - Must be a valid Baggage member key per W3C: token chars only
                      (alphanum, `.`, `-`, `_`). The default form `<ns>.<svc>` already
                      satisfies this because Kubernetes namespace and service names
                      are themselves DNS labels.
                    - User-provided values that match the `<existing-ns>.<existing-svc>`
                      pattern of *another* ContextRoute's effective key collide and
                      are rejected via the Ready condition.
                type: string
              target:
                description: |-
                  Target is the Service that receives external/internal traffic and
                  from which routing decisions are made. The HTTPRoute generated by
                  this ContextRoute attaches to this Service via parentRef.
                properties:
                  service:
                    description: Service is the target Service. Same-namespace only
                      for now.
                    properties:
                      name:
                        description: Name is the Service name in the same namespace
                          as the parent CR.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - service
                type: object
              variants:
                description: |-
                  Variants are the alternate Services traffic may be diverted to,
                  selected by their Service name appearing in the Baggage member
                  "<routingKey>=<service-name>".
                properties:
                  selector:
                    description: |-
                      Selector is a label selector applied to Services in the same namespace.
                      Each matched Service contributes one routing rule on the target's
                      HTTPRoute that fires when the Baggage header contains
                      "x-route-prism=<that-service-name>".
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                required:
                - selector
                type: object
            required:
            - target
            - variants
            type: object
          status:
            description: ContextRouteStatus defines the observed state of ContextRoute.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              conflict:
                description: Conflict, if non-nil, indicates another ContextRoute
                  owns the target.
                properties:
                  ownedBy:
                    description: OwnedBy is the winning ContextRoute (oldest creationTimestamp).
                    type: string
                  service:
                    description: Service is the contested target Service name.
                    type: string
                required:
                - ownedBy
                - service
                type: object
              matchedVariants:
                description: MatchedVariants is the number of variant Services currently
                  selected.
                format: int32
                type: integer
              targetService:
                description: TargetService is the resolved target Service name (echo
                  of spec).
                type: string
              variantServices:
                description: VariantServices lists the variant Service names that
                  produced rules.
                items:
                  type: string
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
