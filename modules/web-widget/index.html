<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>route-prism widget · dev</title>
</head>
<body>
  <p style="font-family: system-ui; color: #666; padding: 2rem">
    Widget dev page. The widget mounts itself; no in-page React/Preact root needed.
  </p>
  <script
    type="module"
    src="/src/main.tsx"
    data-route-prism-config='{"target":"web","namespace":"demo","routingKey":"demo.web","sourceCookie":"x-route-prism","pathPrefix":".route-prism","style":{"mode":"float","margin":{"right":"16px","bottom":"16px"},"hotkey":{"open":"ctrl+\\"}}}'
  ></script>
</body>
</html>
