# 3-tier devloop sample for route-prism.
#
# Topology: web → api → db, each with a stable + a canary variant. Every
# pod runs the tiny `route-prism-sample-tier` HTTP service (see
# cmd/sample-tier/) which:
#
#   - reports its own (tier, pod) on every GET /,
#   - calls NEXT_HOP/ when set, propagating the inbound Baggage + Cookie
#     headers, and
#   - embeds that downstream response under `.downstream`.
#
# Result: a single GET against `web` returns a nested chain
# {tier:web, pod:..., downstream:{tier:api, pod:..., downstream:{tier:db,
# pod:...}}}, so it's trivially observable which variant served each tier.
#
# Each tier has its own ContextRoute + smart-mode EdgeTranslation. Smart
# mode owns routing for the tier (the ContextRoute delegates), so traffic
# entering at any tier flows: client → mesh → translator-<tier>-edge →
# variant Pod IP (selected by the cookie value).
#
# Cookie value uses the multi-key syntax:
#     x-route-prism=<routingKey>:<variant>|<routingKey>:<variant>|...
# Each ContextRoute's routingKey defaults to "<ns>.<target>", so the three
# tiers in this sample are addressable as demo.web / demo.api / demo.db.
# A `.` value means "no fork at this tier".
#
# Per-tier independent verification from a curl pod inside the cluster:
#
#   curl http://web/                                                                # all stable
#   curl -H 'Cookie: x-route-prism=demo.web:web-canary'  http://web/                # web canary
#   curl -H 'Cookie: x-route-prism=demo.api:api-canary'  http://web/                # api canary
#   curl -H 'Cookie: x-route-prism=demo.db:db-canary'    http://web/                # db  canary
#   curl -H 'Cookie: x-route-prism=demo.web:web-canary|demo.db:db-canary' http://web/  # web+db canary
#
# Each tier translator reads only the entry whose routingKey matches its
# own. Unrelated entries are preserved into the outbound Baggage so
# downstream tiers can still see them.
#
# Pick the mesh platform via ./hack/kind-up.sh [--platform cilium|istio|cilium-istio].
# In all cases the controller renders identical GAMMA HTTPRoutes; this file
# is mesh-agnostic.
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    # Enrolls the namespace into Istio ambient when running on Istio /
    # cilium-istio. Ignored by Cilium-only clusters.
    istio.io/dataplane-mode: ambient
---
# ─── Tier 1: web (NEXT_HOP=http://api) ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: web, namespace: demo, labels: { app: web } }
spec:
  replicas: 1
  selector: { matchLabels: { app: web, variant: stable } }
  template:
    metadata: { labels: { app: web, variant: stable } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,     value: web }
        - { name: NEXT_HOP, value: "http://api" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: web-canary, namespace: demo, labels: { app: web } }
spec:
  replicas: 1
  selector: { matchLabels: { app: web, variant: canary } }
  template:
    metadata: { labels: { app: web, variant: canary } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,     value: web }
        - { name: NEXT_HOP, value: "http://api" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: demo, labels: { app: web } }
spec:
  selector: { app: web, variant: stable }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: v1
kind: Service
metadata: { name: web-canary, namespace: demo, labels: { app: web } }
spec:
  selector: { app: web, variant: canary }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: ContextRoute
metadata: { name: web-route, namespace: demo }
spec:
  target: { service: { name: web } }
  variants:
    selector: { matchLabels: { app: web } }
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: EdgeTranslation
metadata: { name: web-edge, namespace: demo }
spec:
  mode: router
  sourceCookie: x-route-prism
  target: { service: { name: web } }
---
# ─── Tier 2: api (NEXT_HOP=http://db) ───────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: demo, labels: { app: api } }
spec:
  replicas: 1
  selector: { matchLabels: { app: api, variant: stable } }
  template:
    metadata: { labels: { app: api, variant: stable } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,     value: api }
        - { name: NEXT_HOP, value: "http://db" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-canary, namespace: demo, labels: { app: api } }
spec:
  replicas: 1
  selector: { matchLabels: { app: api, variant: canary } }
  template:
    metadata: { labels: { app: api, variant: canary } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,     value: api }
        - { name: NEXT_HOP, value: "http://db" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: demo, labels: { app: api } }
spec:
  selector: { app: api, variant: stable }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: v1
kind: Service
metadata: { name: api-canary, namespace: demo, labels: { app: api } }
spec:
  selector: { app: api, variant: canary }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: ContextRoute
metadata: { name: api-route, namespace: demo }
spec:
  target: { service: { name: api } }
  variants:
    selector: { matchLabels: { app: api } }
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: EdgeTranslation
metadata: { name: api-edge, namespace: demo }
spec:
  mode: router
  sourceCookie: x-route-prism
  target: { service: { name: api } }
---
# ─── Tier 3: db (leaf — no NEXT_HOP) ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: db, namespace: demo, labels: { app: db } }
spec:
  replicas: 1
  selector: { matchLabels: { app: db, variant: stable } }
  template:
    metadata: { labels: { app: db, variant: stable } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env: [{ name: TIER, value: db }]
        ports: [{ containerPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: db-canary, namespace: demo, labels: { app: db } }
spec:
  replicas: 1
  selector: { matchLabels: { app: db, variant: canary } }
  template:
    metadata: { labels: { app: db, variant: canary } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env: [{ name: TIER, value: db }]
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: db, namespace: demo, labels: { app: db } }
spec:
  selector: { app: db, variant: stable }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: v1
kind: Service
metadata: { name: db-canary, namespace: demo, labels: { app: db } }
spec:
  selector: { app: db, variant: canary }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: ContextRoute
metadata: { name: db-route, namespace: demo }
spec:
  target: { service: { name: db } }
  variants:
    selector: { matchLabels: { app: db } }
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: EdgeTranslation
metadata: { name: db-edge, namespace: demo }
spec:
  mode: router
  sourceCookie: x-route-prism
  target: { service: { name: db } }
