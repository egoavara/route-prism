# 3-tier devloop sample for route-prism.
#
# Topology: web → api → db, each with a stable + a canary variant. Every
# pod runs the tiny `route-prism-sample-tier` HTTP service (see
# cmd/sample-tier/) which:
#
#   - reports its own (tier, pod) on every GET /,
#   - calls NEXT_HOP/ when set, propagating the inbound Baggage + Cookie
#     headers, and
#   - embeds that downstream response under `.downstream`.
#
# Result: a single GET against `web` returns a nested chain
# {tier:web, pod:..., downstream:{tier:api, pod:..., downstream:{tier:db,
# pod:...}}}, so it's trivially observable which variant served each tier.
#
# Every tier gets a ContextRoute, but only the externally-exposed tiers
# (web, api) get a router-mode EdgeTransformation. db is a leaf consumed
# only from inside the cluster, so its ContextRoute alone is enough — the
# CR-rendered HTTPRoute uses an Envoy-full-match-safe regex on the
# Baggage header, so cookie-translated routing keys reach the right
# variant via mesh routing without a translator pod. Traffic entering at
# web/api flows: client → mesh → translator-<tier>-edge → variant Pod IP
# (selected by the cookie). For db: client → web translator (cookie →
# baggage) → ... → mesh → variant Pod IP (selected by baggage).
#
# Cookie value uses the multi-key syntax:
#     x-route-prism=<routingKey>:<variant>|<routingKey>:<variant>|...
# Each ContextRoute's routingKey defaults to "<ns>.<target>", so the three
# tiers in this sample are addressable as demo.web / demo.api / demo.db.
# A `.` value means "no fork at this tier".
#
# Per-tier independent verification from a curl pod inside the cluster.
# web's `/` now serves the demo HTML console, so chain calls go through
# `/api`; api/db answer the chain on either path.
#
#   curl http://web/api                                                                # all stable
#   curl -H 'Cookie: x-route-prism=demo.web:web-canary'  http://web/api                # web canary
#   curl -H 'Cookie: x-route-prism=demo.api:api-canary'  http://web/api                # api canary
#
# Each tier translator reads only the entry whose routingKey matches its
# own. Unrelated entries are preserved into the outbound Baggage so
# downstream tiers can still see them.
#
# Pick the mesh platform via ./hack/kind-up.sh [--platform cilium|istio|cilium-istio].
# In all cases the controller renders identical GAMMA HTTPRoutes; this file
# is mesh-agnostic.
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    # Enrolls the namespace into Istio ambient when running on Istio /
    # cilium-istio. Ignored by Cilium-only clusters.
    istio.io/dataplane-mode: ambient
---
# ─── Tier 1: web (NEXT_HOP=http://api) ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: web, namespace: demo, labels: { app: web } }
spec:
  replicas: 1
  selector: { matchLabels: { app: web, variant: stable } }
  template:
    metadata: { labels: { app: web, variant: stable } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,           value: web }
        - { name: VARIANT,        value: stable }
        - { name: NEXT_HOP,       value: "http://api" }
        - { name: SERVE_PAGE,     value: "true" }
        - { name: PATH_PREFIX,    value: ".route-prism" }
        - { name: OPERATOR_URL,   value: "http://route-prism-controller-manager-api.route-prism-system.svc:8082" }
        - { name: ROUTING_KEY,    value: "demo.web" }
        - { name: SOURCE_COOKIE,  value: "x-route-prism" }
        # Cross-origin demo button target. Browser hits this URL via
        # kind extraPortMapping → demo-edge → api Service → translator
        # — exercising the widget's fetch override + Baggage path.
        - { name: CROSS_API_URL,  value: "http://localhost:8081/api" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: web-canary, namespace: demo, labels: { app: web } }
spec:
  replicas: 1
  selector: { matchLabels: { app: web, variant: canary } }
  template:
    metadata: { labels: { app: web, variant: canary } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,           value: web }
        - { name: VARIANT,        value: web-canary }
        - { name: NEXT_HOP,       value: "http://api" }
        - { name: SERVE_PAGE,     value: "true" }
        - { name: PATH_PREFIX,    value: ".route-prism" }
        - { name: OPERATOR_URL,   value: "http://route-prism-controller-manager-api.route-prism-system.svc:8082" }
        - { name: ROUTING_KEY,    value: "demo.web" }
        - { name: SOURCE_COOKIE,  value: "x-route-prism" }
        - { name: CROSS_API_URL,  value: "http://localhost:8081/api" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: demo, labels: { app: web } }
spec:
  # ClusterIP so the GAMMA HTTPRoute (created by route-prism for the
  # EdgeTransformation) actually attaches and rewrites traffic to the
  # translator. Cilium GAMMA only applies HTTPRoutes whose parentRef is a
  # ClusterIP Service — once the Service becomes NodePort the HTTPRoute
  # status stays empty and cookie-based variant selection silently
  # bypasses the translator. External access comes through demo-edge
  # below (a tiny nginx with hostPorts that proxies into the mesh).
  selector: { app: web, variant: stable }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: v1
kind: Service
metadata: { name: web-canary, namespace: demo, labels: { app: web } }
spec:
  selector: { app: web, variant: canary }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: ContextRoute
metadata: { name: web-route, namespace: demo }
spec:
  target: { service: { name: web } }
  variants:
    selector: { matchLabels: { app: web } }
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: EdgeTransformation
metadata: { name: web-edge, namespace: demo }
spec:
  mode: router
  sourceCookie: x-route-prism
  target: { service: { name: web } }
---
# ─── Tier 2: api (NEXT_HOP=http://db) ───────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: demo, labels: { app: api } }
spec:
  replicas: 1
  selector: { matchLabels: { app: api, variant: stable } }
  template:
    metadata: { labels: { app: api, variant: stable } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,               value: api }
        - { name: VARIANT,            value: stable }
        - { name: NEXT_HOP,           value: "http://db" }
        # Allow the cross-origin button on the web demo page to reach us.
        - { name: CORS_ALLOW_ORIGINS, value: "http://localhost:8080" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-canary, namespace: demo, labels: { app: api } }
spec:
  replicas: 1
  selector: { matchLabels: { app: api, variant: canary } }
  template:
    metadata: { labels: { app: api, variant: canary } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,               value: api }
        - { name: VARIANT,            value: api-canary }
        - { name: NEXT_HOP,           value: "http://db" }
        - { name: CORS_ALLOW_ORIGINS, value: "http://localhost:8080" }
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: demo, labels: { app: api } }
spec:
  selector: { app: api, variant: stable }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: v1
kind: Service
metadata: { name: api-canary, namespace: demo, labels: { app: api } }
spec:
  selector: { app: api, variant: canary }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: ContextRoute
metadata: { name: api-route, namespace: demo }
spec:
  target: { service: { name: api } }
  variants:
    selector: { matchLabels: { app: api } }
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: EdgeTransformation
metadata: { name: api-edge, namespace: demo }
spec:
  mode: router
  sourceCookie: x-route-prism
  target: { service: { name: api } }
---
# ─── Tier 3: db (leaf — no NEXT_HOP) ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: db, namespace: demo, labels: { app: db } }
spec:
  replicas: 1
  selector: { matchLabels: { app: db, variant: stable } }
  template:
    metadata: { labels: { app: db, variant: stable } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,    value: db }
        - { name: VARIANT, value: stable }
        ports: [{ containerPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: db-canary, namespace: demo, labels: { app: db } }
spec:
  replicas: 1
  selector: { matchLabels: { app: db, variant: canary } }
  template:
    metadata: { labels: { app: db, variant: canary } }
    spec:
      containers:
      - name: tier
        image: route-prism-sample-tier
        env:
        - { name: TIER,    value: db }
        - { name: VARIANT, value: db-canary }
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: db, namespace: demo, labels: { app: db } }
spec:
  selector: { app: db, variant: stable }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: v1
kind: Service
metadata: { name: db-canary, namespace: demo, labels: { app: db } }
spec:
  selector: { app: db, variant: canary }
  ports: [{ port: 80, targetPort: 8080, name: http, appProtocol: http }]
---
apiVersion: route-prism.egoavara.net/v1alpha1
kind: ContextRoute
metadata: { name: db-route, namespace: demo }
spec:
  target: { service: { name: db } }
  variants:
    selector: { matchLabels: { app: db } }
---
# ─── Edge proxy: host-port → in-cluster Service IP ──────────────────
# A tiny nginx pod that listens on hostPort 30080/30081/30083 (kind
# extraPortMappings expose those as host:8080/8081/8083) and proxies
# each port to the corresponding Service ClusterIP. Going through the
# Service IP is what triggers the GAMMA HTTPRoute / translator chain
# attached to that Service — direct kubectl port-forward to a pod, or
# NodePort traffic, both bypass GAMMA on Cilium and silently fall back
# to stable.
apiVersion: v1
kind: ConfigMap
metadata: { name: demo-edge-conf, namespace: demo }
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      # Resolve Service names against kube-dns lazily so a CR/ET
      # rebuild that recreates the translator Service doesn't pin nginx
      # to a stale ClusterIP.
      resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;
      proxy_http_version 1.1;
      # Pass cookie / baggage as-is so the translator and downstream
      # tiers keep observing the routing context the user set.
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      server {
        listen 30080;
        location / {
          set $upstream "http://web.demo.svc.cluster.local:80";
          proxy_pass $upstream;
        }
      }
      server {
        listen 30081;
        location / {
          set $upstream "http://api.demo.svc.cluster.local:80";
          proxy_pass $upstream;
        }
      }
      server {
        listen 30083;
        location / {
          set $upstream "http://db.demo.svc.cluster.local:80";
          proxy_pass $upstream;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: demo-edge, namespace: demo, labels: { app: demo-edge } }
spec:
  replicas: 1
  selector: { matchLabels: { app: demo-edge } }
  template:
    metadata: { labels: { app: demo-edge } }
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - { name: web, containerPort: 30080, protocol: TCP }
        - { name: api, containerPort: 30081, protocol: TCP }
        - { name: db,  containerPort: 30083, protocol: TCP }
        volumeMounts:
        - { name: conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
      volumes:
      - name: conf
        configMap: { name: demo-edge-conf }
---
# NodePort Service that publishes the edge proxy on the same nodePorts
# kind extraPortMappings forward (host:8080/8081/8083). NodePort is L4
# only — its destination is the edge pod, not a GAMMA-attached tier
# Service, so no HTTPRoute is needed here. The edge pod's nginx then
# proxies to web/api/db ClusterIPs which IS where GAMMA fires.
apiVersion: v1
kind: Service
metadata: { name: demo-edge, namespace: demo, labels: { app: demo-edge } }
spec:
  type: NodePort
  selector: { app: demo-edge }
  ports:
  - { name: web, port: 30080, targetPort: 30080, nodePort: 30080, protocol: TCP }
  - { name: api, port: 30081, targetPort: 30081, nodePort: 30081, protocol: TCP }
  - { name: db,  port: 30083, targetPort: 30083, nodePort: 30083, protocol: TCP }
