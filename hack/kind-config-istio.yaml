# kind cluster config tuned for Istio (ambient mode) with Gateway API (GAMMA).
# - Default kindnet CNI is kept (Istio sits on top of any conformant CNI).
# - kube-proxy stays enabled; Istio does not replace it.
# - ipFamily: ipv4 explicit so istio-cni waypoint pods schedule predictably.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Cluster name is supplied via `--name $CLUSTER` from hack/kind-up.sh so the
# matrix runner can spin up parallel disposable clusters from the same
# config without colliding with the dev cluster (default name: route-prism).
networking:
  ipFamily: ipv4
nodes:
- role: control-plane
