# kind cluster config tuned for Cilium with Gateway API (GAMMA).
# - disableDefaultCNI: skip kindnet so Cilium is the only CNI.
# - kubeProxyMode: none — Cilium replaces kube-proxy.
# - extraPortMappings: bind a few NodePorts onto the host so demo Services
#   (web/api/db) can be reached at fixed host ports without leaning on
#   `kubectl port-forward` (which targets a pod directly and bypasses the
#   mesh's HTTPRoute / translator chain). The Services in
#   test/devloop/sample.yaml use the same nodePort numbers.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Cluster name is supplied via `--name $CLUSTER` from hack/kind-up.sh so the
# matrix runner can spin up parallel disposable clusters from the same
# config without colliding with the dev cluster (default name: route-prism).
networking:
  disableDefaultCNI: true
  kubeProxyMode: none
nodes:
- role: control-plane
  extraPortMappings:
  - { containerPort: 30080, hostPort: 8080, protocol: TCP }  # web
  - { containerPort: 30081, hostPort: 8081, protocol: TCP }  # api
  - { containerPort: 30083, hostPort: 8083, protocol: TCP }  # db
