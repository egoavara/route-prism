    controller-gen.kubebuilder.io/version: v0.20.1
  name: edgetranslations.route-prism.egoavara.net
spec:
  group: route-prism.egoavara.net
  names:
    kind: EdgeTranslation
    listKind: EdgeTranslationList
    plural: edgetranslations
    shortNames:
    - et
    singular: edgetranslation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.target.service.name
      name: Target
      type: string
    - jsonPath: .status.translatorReady
      name: Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: EdgeTranslation is the Schema for the edgetranslations API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              EdgeTranslationSpec defines the desired state of EdgeTranslation.

              The controller emits a single HTTPRoute attached to the target Service
              with two rules: rule A (already translated, baggage carries the checked
              marker) routes to the target itself; rule B (catch-all) routes to the
              nginx translator. The translator extracts the source cookie, stamps a
              baggage member, adds the checked marker, and proxies back to the target.
            properties:
              mode:
                description: |-
                  Mode selects the translator implementation. Prototype only supports
                  "router" (a small nginx Deployment provisioned by the controller).
                enum:
                - router
                - envoy-lua
                - envoy-wasm
                type: string
              sourceCookie:
                description: |-
                  SourceCookie is the cookie key whose value will be lifted into the
                  baggage member "x-route-prism=<value>".
                minLength: 1
                type: string
              target:
                description: |-
                  Target is the Service whose inbound traffic should be intercepted
                  and translated.
                properties:
                  service:
                    description: Service is the target Service. Same-namespace only
                      for now.
                    properties:
                      name:
                        description: Name is the Service name in the same namespace
                          as the parent CR.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - service
                type: object
            required:
            - mode
            - sourceCookie
            - target
            type: object
          status:
            description: EdgeTranslationStatus defines the observed state of EdgeTranslation.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              targetService:
                description: TargetService is the resolved target Service name (echo
                  of spec).
                type: string
              translatorReady:
                description: |-
                  TranslatorReady is true once the provisioned Deployment reports >=1
                  available replica.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
