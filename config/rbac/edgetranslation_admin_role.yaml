# This rule is not used by the project route-prism itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over route-prism.egoavara.net.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: route-prism
    app.kubernetes.io/managed-by: kustomize
  name: edgetranslation-admin-role
rules:
- apiGroups:
  - route-prism.egoavara.net
  resources:
  - edgetranslations
  verbs:
  - '*'
- apiGroups:
  - route-prism.egoavara.net
  resources:
  - edgetranslations/status
  verbs:
  - get
